<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Photo Gallery</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align:center; padding:3rem 1.5rem; color:#111; }
    .spinner { width:36px; height:36px; border:4px solid #ddd; border-top-color:#2563eb;
               border-radius:50%; animation:spin 1s linear infinite; margin:1rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    a { color:#2563eb; } #offline { display:none; }
  </style>
</head>
<body>
  <script>const GALLERY_URL = "https://smith-wednesday-tide-freeze.trycloudflare.com";</script>

  <div id="loading"><div class="spinner"></div><p>Loading the photo gallery…</p></div>
  <div id="offline">
    <h2>The photo gallery is temporarily offline</h2>
    <p>Please try again later. If it stays down, check back in a little while.</p>
    <p><a id="retry" href="#">Retry now</a></p>
  </div>

  <script>
    const url = GALLERY_URL.replace(/\/+$/, "");
    function showOffline(){document.getElementById("loading").style.display="none";document.getElementById("offline").style.display="block";}
    async function go(){try{const r=await fetch(url+"/health",{cache:"no-store"});if(r.ok){window.location.href=url+"/";return;}showOffline();}catch(e){showOffline();}}
    document.getElementById("retry").addEventListener("click",e=>{e.preventDefault();document.getElementById("offline").style.display="none";document.getElementById("loading").style.display="block";go();});
    go();
  </script>
</body>
</html>
